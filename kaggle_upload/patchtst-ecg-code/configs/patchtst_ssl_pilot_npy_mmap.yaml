# A/B Test: NPY mmap backend
data:
  train_csv: "splits/pilot/pilot_train.csv"
  val_csv:   "splits/pilot/pilot_val.csv"
  test_csv:  "splits/test.csv"
  data_dir:  "raw_wfdb"
  backend:   "npy_mmap"
  npy_dir:   "records_npy"
  seq_len:   6000
  n_channels: 2

pretrain:
  patch_len:   12
  stride:      12
  patch_num:   500
  mask_ratio:  0.4
  mask_type:   "random"
  revin_norm:  true

model:
  d_model:     128
  n_heads:     16
  n_layers:    3
  d_ff:        256
  dropout:     0.1
  max_patches: 1024

training:
  epochs:      1
  batch_size:  32
  optimizer:   "adamw"
  lr:          1.0e-3
  weight_decay: 0.0
  grad_clip:   1.0
  scheduler:   "none"
  warmup_epochs: 0
  seed:        42
  num_workers: 2
  mixed_precision: "fp32"
  device:      "cuda"

checkpoint:
  save_dir: "outputs/backend_ab/npy_mmap/"
  save_best: true
  monitor:   "val_loss"
  mode:      "min"
  save_last: true
  resume:    false
